<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ════════════════════════════════════════════════════════
       FONTS — Switzer (display) + Inter (body)
       Loaded from Fontshare for Switzer + Google for Inter
       ════════════════════════════════════════════════════════ -->
  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- ════════════════════════════════════════════════════════
       STYLES — load order matters: tokens → base → layout → ...
       ════════════════════════════════════════════════════════ -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/pages/home.css">
  <link rel="stylesheet" href="css/pages/services.css">
  <link rel="stylesheet" href="css/pages/case-studies.css">
  <link rel="stylesheet" href="css/pages/contact.css">
  <link rel="stylesheet" href="css/pages/legal.css">
</head>
<body>

  <!-- ════════════════════════════════════════════════════════
       COOKIE BANNER
       ════════════════════════════════════════════════════════ -->
  <div id="cookie-banner">
    <span id="cb-text">Diese Website verwendet ausschließlich technisch notwendige Cookies. <a href="#" onclick="showPage('datenschutz');closeBanner();return false;">Datenschutzerklärung</a></span>
    <div class="cb-btns">
      <button onclick="closeBanner()">Ablehnen</button>
      <button id="cb-accept" onclick="closeBanner()">Verstanden</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════
       NAVIGATION
       ════════════════════════════════════════════════════════ -->
  <nav>
    <div class="nav-in">
      <a href="#" class="logo-link" onclick="showPage('home');return false;">
        <img src="assets/logo.png" alt="AK DigiWerk" class="logo-img">
        <span class="logo-text">AK DigiWerk</span>
      </a>
      <div class="nav-links">
        <button onclick="showPage('home')"        id="nav-home"     class="active" data-key="n0">Home</button>
        <button onclick="showPage('services')"    id="nav-services"                data-key="n1">Services</button>
        <button onclick="showPage('casestudies')" id="nav-cs"                      data-key="n2">Case Studies</button>
        <button onclick="showPage('contact')"     id="nav-contact"                 data-key="n3">Contact</button>
        <button onclick="showPage('contact')"     class="nav-cta"                  data-key="n4">Get in touch</button>
      </div>
      <div class="lang-sw">
        <button id="lb-en" class="on" onclick="setLang('en')">EN</button>
        <button id="lb-de"            onclick="setLang('de')">DE</button>
      </div>
    </div>
  </nav>

  <!-- ════════════════════════════════════════════════════════
       PAGE CONTAINER — partials loaded here by app.js
       ════════════════════════════════════════════════════════ -->
  <div id="page-container"></div>

  <!-- ════════════════════════════════════════════════════════
       FOOTER
       ════════════════════════════════════════════════════════ -->
  <footer>
    <div class="f-in">
      <div class="f-brand">
        <img src="assets/logo.png" alt="">
        <span>AK DigiWerk</span>
      </div>
      <div class="f-copy">© 2026 Affan Khan · Flensburg, Deutschland · USt-IdNr. auf Anfrage</div>
      <div class="f-links">
        <a href="#" onclick="showPage('impressum');return false;" data-key="fim">Impressum</a>
        <a href="#" onclick="showPage('datenschutz');return false;" data-key="fprv">Datenschutz</a>
      </div>
    </div>
  </footer>

  <!-- ════════════════════════════════════════════════════════
       SCRIPTS — order matters
       ════════════════════════════════════════════════════════ -->
  <script src="js/data/translations-en.js"></script>
  <script src="js/data/translations-de.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/cookie-banner.js"></script>
  <script src="js/contact-form.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
